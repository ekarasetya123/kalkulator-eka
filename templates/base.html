<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}KalkulatorPro{% endblock %} — Eka Prasetya Wardana</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 768px) { .container { padding: 0 16px; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="wise-navbar">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin:0 auto;padding:0 32px;">

      <!-- Logo -->
      <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:36px;height:36px;background:var(--primary);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;">
          <i class="fas fa-calculator" style="color:var(--on-primary);font-size:16px;"></i>
        </div>
        <span style="font-size:16px;font-weight:900;color:var(--ink);letter-spacing:-0.5px;">KalkulatorPro</span>
      </a>

      <!-- Desktop Nav -->
      <div class="desktop-nav" style="display:flex;align-items:center;gap:4px;">
        <a href="/" class="wise-nav-link {% if request.endpoint=='index' %}active{% endif %}">
          <i class="fas fa-home" style="font-size:12px;"></i>Dashboard
        </a>
        <a href="/aritmatika" class="wise-nav-link {% if request.endpoint=='aritmatika' %}active{% endif %}">
          <i class="fas fa-calculator" style="font-size:12px;"></i>Aritmatika
        </a>
        <a href="/logika" class="wise-nav-link {% if request.endpoint=='logika' %}active{% endif %}">
          <i class="fas fa-code-branch" style="font-size:12px;"></i>Logika
        </a>
        <a href="/transformasi" class="wise-nav-link {% if request.endpoint=='transformasi' %}active{% endif %}">
          <i class="fas fa-exchange-alt" style="font-size:12px;"></i>Transformasi
        </a>
      </div>

      <!-- Theme Toggle -->
      <button onclick="toggleTheme()" id="themeBtn"
        style="background:var(--canvas-soft);border:none;border-radius:var(--radius-pill);width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:var(--ink);">
        <i class="fas fa-moon" id="themeIcon" style="font-size:15px;"></i>
      </button>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container" style="padding-top:40px;padding-bottom:80px;">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer style="background:var(--ink);padding:48px 32px;">
    <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:32px;height:32px;background:var(--primary);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;">
          <i class="fas fa-calculator" style="color:var(--on-primary);font-size:13px;"></i>
        </div>
        <span style="font-size:16px;font-weight:900;color:var(--primary);letter-spacing:-0.5px;">KalkulatorPro</span>
      </div>
      <p style="font-size:13px;font-weight:400;color:var(--canvas-soft);">
        © 2026 <strong style="color:var(--primary);font-weight:600;">Eka Prasetya Wardana</strong> · Pengantar Pemrograman 2025/2026
      </p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
